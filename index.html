<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a1612">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Walk Log">
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Walk Log</title>
</head>
<body>

<!-- Header -->
<div class="header">
    <div class="header-inner">
        <div>
            <div class="app-title">Walk <em>Log</em></div>
            <div class="week-label" id="weekLabel">—</div>
        </div>
        <div class="header-right">
            <div class="sync-indicator" id="syncIndicator"></div>
            <button class="history-btn" id="historyBtn" aria-label="View history">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="1" y="3" width="16" height="2" rx="1" fill="currentColor"/>
                    <rect x="1" y="8" width="16" height="2" rx="1" fill="currentColor"/>
                    <rect x="1" y="13" width="10" height="2" rx="1" fill="currentColor"/>
                </svg>
            </button>
        </div>
    </div>
</div>

<!-- Offline banner -->
<div class="offline-banner" id="offlineBanner">You're offline — changes will sync when connected</div>

<!-- Main -->
<div class="main">

    <div class="install-banner" id="installBanner">
        <span>Add to home screen for the best experience</span>
        <button class="install-btn" id="installBtn">Install</button>
        <button class="install-dismiss" id="installDismiss">×</button>
    </div>

    <div class="stats-row">
        <div class="stat-card streak">
            <div class="stat-label">Current streak</div>
            <div class="stat-value" id="statStreak">0<span class="stat-suffix">d</span></div>
        </div>
        <div class="stat-card">
            <div class="stat-label">This week</div>
            <div class="stat-value" id="statPct">0<span class="stat-suffix">%</span></div>
        </div>
    </div>

    <div class="week-card" id="weekCard">
        <div class="week-card-header">This week's walks</div>
        <div class="days-grid" id="daysGrid"></div>
        <div class="done-msg" id="doneMsg">Great week — all walks logged ✓</div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="legend-dot walked"></div> walked</div>
        <div class="legend-item"><div class="legend-dot rest"></div> rest day</div>
        <div class="legend-item"><div class="legend-dot none"></div> not logged</div>
    </div>

    <div class="footer-note">tap once: walked · twice: rest · thrice: clear</div>
</div>

<!-- History panel -->
<div class="history-panel" id="historyPanel">
    <div class="history-sheet">
        <div class="history-header">
            <div class="history-title">Past weeks</div>
            <button class="history-close" id="historyClose" aria-label="Close">×</button>
        </div>
        <div class="history-list" id="historyList"></div>
    </div>
</div>

<script src="js/storage.js"></script>
<script src="js/pwa.js"></script>
<script src="js/app.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
    }
</script>
</body>
</html>
